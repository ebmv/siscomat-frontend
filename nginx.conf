server {
    listen 80;
    server_name localhost;

    # Optimización de transferencia: Comprime assets en tránsito para reducir latencia
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;

        # Fallback para SPA: Redirige rutas virtuales (React Router) al index.html 
        try_files $uri $uri/ /index.html;

        # Estrategia de invalidación: Fuerza al navegador a validar el ETag del HTML
        # Asegura que el usuario reciba la última versión del portal tras cada deploy
        add_header Cache-Control "no-cache";
    }

    # Cache de Assets Inmutables: Archivos con nombres únicos generados por Vite (hash)
    # Mejora drásticamente el rendimiento en visitas recurrentes
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        root /usr/share/nginx/html;
        
        # Al usar hashes en los nombres, el archivo nunca cambia; se cachea agresivamente.
        # Si el código cambia, el nombre cambia y el navegador descarga el nuevo automáticamente.
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}